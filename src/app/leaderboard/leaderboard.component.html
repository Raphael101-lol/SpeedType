<div class="leaderboard">
  <h1 class="title">Leaderboard</h1>

  @for (mode of modes; track mode) {
    <div class="section">
      <h2>{{ mode }}</h2>

      @for (score of allScores[mode]; track $index; let i = $index) {
        <div class="row">
          <span class="rank">#{{ i + 1 }}</span>
          <span class="player-name">{{ score.username }}</span>
          <span class="player-wpm">{{ score.wpm }} WPM</span>
          <span class="player-accuracy">{{ score.accuracy }}%</span>
          <span class="player-time">{{ score.time }}s</span>
          <button class="delete-btn" (click)="deleteScore(score._id)">✕</button>
        </div>
      }
      @if (allScores[mode].length === 0) {
        <p>No scores</p>
      }
    </div>
  }

  <button class="back-btn" routerLink="/menu">Back</button>
</div>
