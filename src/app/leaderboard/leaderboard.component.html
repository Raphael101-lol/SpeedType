<div class="leaderboard">
  <h1>Leaderboard</h1>

  @for (mode of modes; track mode) {
    <div class="section">
      <h2>{{ mode }}</h2>

      @for (score of allScores[mode]; track $index; let i = $index) {
        <div class="row">
          <span>#{{ i + 1 }}</span>
          <span>{{ score.username }}</span>
          <span>{{ score.wpm }} WPM</span>
          <span>{{ score.accuracy }}%</span>
          <span>{{ score.time }}s</span>
          <button (click)="deleteScore(score._id)">✕</button>
        </div>
      }

      @if (allScores[mode].length === 0) {
        <p>No scores</p>
      }
    </div>
  }

  <button routerLink="/menu">Back</button>
</div>
