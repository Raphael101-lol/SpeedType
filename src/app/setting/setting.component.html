<div class="settings">
  <h1>Settings</h1>

  <div class="option">
    <label>Primary Color</label>
    <input type="color" [value]="primary" (input)="changePrimary($event)">
  </div>

  <div class="option">
    <label>Secondary Color</label>
    <input type="color" [value]="secondary" (input)="changeSecondary($event)">
  </div>

  <div class="preview">
    <button class="preview-primary" [style.background]="primary">Primary</button>
    <button class="preview-secondary" [style.background]="secondary">Secondary</button>
  </div>

  <button class="apply-btn" (click)="apply()">Apply</button>
  <button class="reset-btn" (click)="reset()">Reset</button>
  <button class="back-btn" routerLink="/menu">Back</button>
</div>
